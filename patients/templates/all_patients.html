<!DOCTYPE html> 
<html lang="ar" dir="rtl"> 
    <head> 
    <meta charset="UTF-8"> 
    <title>👥 إدارة المرضى | عيادة طب الأسنان</title>
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
      
    <style>
        :root {
          --emerald-50: #ecfdf5;
          --emerald-100: #d1fae5;
          --emerald-200: #a7f3d0;
          --emerald-300: #6ee7b7;
          --emerald-400: #34d399;
          --emerald-500: #10b981;
          --emerald-600: #059669;
          --emerald-700: #047857;
          --emerald-800: #065f46;
          --emerald-900: #064e3b;
          --white: #ffffff;
          --gray-50: #f8fafc;
          --gray-100: #f1f5f9;
          --gray-200: #e2e8f0;
          --gray-300: #cbd5e1;
          --gray-400: #94a3b8;
          --gray-500: #64748b;
          --gray-600: #475569;
          --gray-700: #334155;
          --gray-800: #1e293b;
          --amber-300: #fcd34d;
          --rose-400: #fb7185;
        }
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        body {
          font-family: 'Tajawal', sans-serif;
          background: var(--emerald-50);
          min-height: 100vh;
          position: relative;
          overflow-x: hidden;
          -webkit-tap-highlight-color: transparent;
        } /* دوائر زخرفية */
        body::before {
          content: '';
          position: fixed;
          top: -200px;
          left: -100px;
          width: 480px;
          height: 480px;
          background: radial-gradient(circle, rgba(16, 185, 129, 0.09) 0%, transparent 70%);
          border-radius: 50%;
          z-index: 0;
          pointer-events: none;
        }
        body::after {
          content: '';
          position: fixed;
          bottom: -160px;
          right: -80px;
          width: 380px;
          height: 380px;
          background: radial-gradient(circle, rgba(6, 78, 59, 0.05) 0%, transparent 70%);
          border-radius: 50%;
          z-index: 0;
          pointer-events: none;
        }
        .app {
          max-width: 560px;
          margin: 0 auto;
          padding-bottom: 40px;
          position: relative;
          z-index: 1;
        } /* ═══ HEADER ═══ */
        .page-header {
          background: linear-gradient(165deg, #064e3b 0%, #047857 30%, #059669 65%, #10b981 100%);
          color: white;
          padding: 28px 20px 30px;
          text-align: center;
          border-radius: 0 0 40px 40px;
          box-shadow: 0 16px 40px rgba(6, 78, 59, 0.2);
          position: relative;
          overflow: hidden;
        }
        .page-header::before {
          content: '';
          position: absolute;
          top: -60px;
          right: -30px;
          width: 180px;
          height: 180px;
          border: 2px solid rgba(255, 255, 255, 0.07);
          border-radius: 50%;
        }
        .page-header::after {
          content: '';
          position: absolute;
          bottom: -40px;
          left: -20px;
          width: 130px;
          height: 130px;
          border: 2px solid rgba(255, 255, 255, 0.05);
          border-radius: 50%;
        }
        .header-inner {
          position: relative;
          z-index: 1;
        }
        .header-icon-wrap {
          width: 60px;
          height: 60px;
          border-radius: 18px;
          background: rgba(255, 255, 255, 0.14);
          backdrop-filter: blur(10px);
          margin: 0 auto 10px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 30px;
          border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .page-header h2 {
          margin: 0;
          font-size: 26px;
          font-weight: 900;
          letter-spacing: -0.3px;
        }
        .page-header .header-sub {
          font-size: 13px;
          opacity: 0.7;
          margin-top: 4px;
          font-weight: 500;
        }
        .back-link {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          margin-top: 14px;
          color: rgba(255, 255, 255, 0.8);
          text-decoration: none;
          font-size: 13px;
          font-weight: 600;
          padding: 8px 16px;
          background: rgba(255, 255, 255, 0.1);
          border-radius: 12px;
          border: 1px solid rgba(255, 255, 255, 0.12);
          transition: all 0.2s;
        }
        .back-link:active {
          background: rgba(255, 255, 255, 0.22);
          transform: scale(0.95);
        } /* ═══ SEARCH ═══ */
        .search-section {
          padding: 20px 18px 0;
          display: flex;
          flex-direction: column;
          gap: 18px;
        }
        .search-group .search-label {
          display: flex;
          align-items: center;
          gap: 6px;
          font-size: 13px;
          font-weight: 700;
          color: var(--gray-500);
          margin-bottom: 8px;
          letter-spacing: 0.3px;
        }
        .search-label .label-dot {
          width: 7px;
          height: 7px;
          border-radius: 50%;
          background: var(--emerald-400);
        }
        .input-wrap {
          background: var(--white);
          border-radius: 18px;
          box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
          border: 1.5px solid var(--gray-100);
          overflow: hidden;
          transition: all 0.3s;
        }
        .input-wrap:focus-within {
          border-color: var(--emerald-400);
          box-shadow: 0 0 0 5px rgba(52, 211, 153, 0.08);
        }
        .input-wrap input {
          width: 100%;
          padding: 15px 18px;
          border: none;
          background: transparent;
          font-size: 15px;
          font-family: 'Tajawal', sans-serif;
          color: var(--gray-800);
          outline: none;
        }
        .input-wrap input::placeholder {
          color: var(--gray-300);
          font-size: 14px;
        }
        .search-divider {
          display: flex;
          align-items: center;
          gap: 10px;
          padding: 0 18px;
        }
        .search-divider .divider-line {
          flex: 1;
          height: 1px;
          background: var(--gray-100);
        }
        .search-divider span {
          font-size: 11px;
          font-weight: 700;
          color: var(--gray-400);
          white-space: nowrap;
        } /* ═══ RESULTS ═══ */
        #results {
          padding: 16px 18px 30px;
          display: flex;
          flex-direction: column;
          gap: 12px;
        } /* ═══ PATIENT CARD ═══ */
        .patient-card {
          background: var(--white);
          padding: 18px;
          border-radius: 22px;
          box-shadow: 0 4px 18px rgba(0, 0, 0, 0.04);
          border: 1px solid var(--gray-100);
          transition: all 0.25s;
          cursor: pointer;
          position: relative;
          overflow: hidden;
        }
        .patient-card::before {
          content: '';
          position: absolute;
          right: 0;
          top: 14px;
          bottom: 14px;
          width: 4px;
          border-radius: 0 4px 4px 0;
          background: var(--emerald-400);
        }
        .patient-card:active {
          transform: scale(0.98);
          box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }
        .patient-top {
          display: flex;
          align-items: center;
          gap: 12px;
          margin-bottom: 12px;
        }
        .patient-avatar {
          width: 46px;
          height: 46px;
          border-radius: 14px;
          background: linear-gradient(135deg, #d1fae5, #a7f3d0);
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 20px;
          font-weight: 800;
          color: var(--emerald-700);
          flex-shrink: 0;
        }
        .patient-name {
          font-weight: 800;
          font-size: 17px;
          color: var(--gray-800);
          letter-spacing: -0.2px;
        }
        .patient-hint {
          font-size: 12px;
          color: var(--gray-400);
          font-weight: 500;
        }
        .patient-treatment {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          color: var(--emerald-700);
          font-size: 14px;
          font-weight: 700;
          background: var(--emerald-100);
          padding: 8px 14px;
          border-radius: 12px;
          margin-bottom: 12px;
        }
        .patient-money {
          display: flex;
          gap: 8px;
        }
        .money-badge {
          flex: 1;
          background: var(--gray-50);
          border-radius: 12px;
          padding: 10px 8px;
          text-align: center;
          font-size: 11px;
          font-weight: 600;
          color: var(--gray-500);
        }
        .money-badge .amount {
          font-size: 15px;
          font-weight: 800;
          display: block;
          color: var(--gray-800);
          margin-top: 2px;
        }
        .money-badge.remain .amount {
          color: var(--rose-400);
        } /* ═══ EMPTY / NO RESULTS ═══ */
        .empty-state {
          text-align: center;
          padding: 44px 20px;
        }
        .empty-icon {
          width: 72px;
          height: 72px;
          border-radius: 22px;
          background: var(--emerald-100);
          margin: 0 auto 14px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 34px;
        }
        .empty-title {
          font-size: 17px;
          font-weight: 700;
          color: var(--gray-700);
          margin-bottom: 4px;
        }
        .empty-desc {
          font-size: 13px;
          color: var(--gray-400);
        } /* ═══ RESPONSIVE ═══ */
        @media (max-width: 420px) {
          .page-header {
            padding: 24px 14px 26px;
            border-radius: 0 0 32px 32px;
          }
          .page-header h2 {
            font-size: 22px;
          }
          .header-icon-wrap {
            width: 50px;
            height: 50px;
            font-size: 24px;
          }
          .search-section {
            padding: 16px 12px 0;
            gap: 14px;
          }
          #results {
            padding: 12px 12px 30px;
          }
          .patient-card {
            padding: 14px;
            border-radius: 18px;
          }
        }
      </style> 
    </head>
     <body>
         <div class="app"> 
            <!-- ═══ HEADER ═══ -->
             <header class="page-header"> 
                <div class="header-inner">
                     <div class="header-icon-wrap">👥</div> <h2>إدارة المرضى</h2> 
                     <p class="header-sub">بحث متقدم وسجلات طبية</p> 
                     <a href="/" class="back-link">← العودة للرئيسية</a> 
                    </div> 
            </header> 
            <!-- ═══ SEARCH ═══ --> 
            <div class="search-section"> <!-- بحث بالاسم --> <div class="search-group">
                 <span class="search-label"> <span class="label-dot">

                 </span> بحث بالاسم </span> <div class="input-wrap">
                     <input type="text" id="search" placeholder="اكتب اسم المريض هنا..." autocomplete="off"> </div>
                     </div> <!-- فاصل --> <div class="search-divider"> 
                        <span class="divider-line"></span> <span>أو</span>
                         <span class="divider-line"></span> </div>
                          <!-- بحث بالتاريخ -->
                           <div class="search-group"> <span class="search-label"> 
                            <span class="label-dot"></span> تصفح حسب تاريخ الجلسة </span> 
                            <div class="input-wrap">
                                 <input type="date" id="date" max="{{ today }}"> </div> 
                                </div> </div>
                                 <!-- ═══ RESULTS ═══ --> 
                                 <div id="results"> <div class="empty-state"> 
                                    <div class="empty-icon">🔍</div>
                                     <p class="empty-title">ابدأ البحث عن مريض</p> 
                                     <p class="empty-desc">اكتب الاسم أو اختر تاريخاً</p> 
                                    </div> </div> 
                                </div>
<script> 
function fetchPatients(){ let q = document.getElementById("search").value.trim(); let date = document.getElementById("date").value; 
          if (date) { q = ""; document.getElementById("search").value = ""; } 
              if (!q && !date) {
                document.getElementById("results").innerHTML = ` <div class="empty-state">
                                             <div class="empty-icon">🔍</div>
                                              <p class="empty-title">ابدأ البحث عن مريض</p> 
                                              <p class="empty-desc">اكتب الاسم أو اختر تاريخاً</p>
                                             </div>`; return; }
                                              fetch(`/api/search-patients/?q=${encodeURIComponent(q)}&date=${encodeURIComponent(date)}`) .then
                                              (res => res.json()) .then(data => { let box = document.getElementById("results"); box.innerHTML = "";
if (data.patients.length === 0)
{ box.innerHTML = ` <div class="empty-state"> <div class="empty-icon">😕</div>
<p class="empty-title">لا توجد نتائج</p> 
<p class="empty-desc">جرب اسماً آخر أو تاريخاً مختلفاً</p> 
 </div>`; return; } 
data.patients.forEach(p => { if (data.mode === "search") 
 { box.innerHTML += ` <div class="patient-card" onclick="openHistory('${p.first_name}', '${p.last_name}')"> <div class="patient-top"> <div class="patient-avatar">${p.first_name.charAt(0)}</div> 
 <div> 
<div class="patient-name">${p.first_name} ${p.last_name}</div> 
<div class="patient-hint">اضغط لعرض السجل الطبي ←</div> </div> </div> </div>`; } 
if (data.mode === "date") { const remaining = p.total_amount - p.paid_amount;
 box.innerHTML += ` <div class="patient-card"> <div class="patient-top">
<div class="patient-avatar">${p.first_name.charAt(0)}</div>
<div class="patient-name">${p.first_name} ${p.last_name}</div>
</div> <div class="patient-treatment"> 🦷 ${p.treatment} </div> 
                                                             <div class="patient-money">
                                                                 <div class="money-badge"> الإجمالي <span class="amount">${p.total_amount} دج</span> </div>
                                                                  <div class="money-badge"> المدفوع <span class="amount">${p.paid_amount} دج</span> </div> 
                                                                  <div class="money-badge remain"> المتبقي <span class="amount">${remaining} دج</span>
                                                                 </div> 
                                                                </div> 
                                                                </div>`; } }); }); } document.getElementById("search").addEventListener("input", fetchPatients); document.getElementById("date").addEventListener("change", fetchPatients); function openHistory(first, last) { window.location.href = `/patient-history/?first=${encodeURIComponent(first)}&last=${encodeURIComponent(last)}`; } 
                                                            </script>
         </body>
          </html>
