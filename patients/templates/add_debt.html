<!DOCTYPE html> <html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>➕ إضافة دين جديد | عيادة طب الأسنان</title> <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" /> 
    <style>
      :root {
        --emerald-50: #ecfdf5;
        --emerald-100: #d1fae5;
        --emerald-200: #a7f3d0;
        --emerald-400: #34d399;
        --emerald-500: #10b981;
        --emerald-600: #059669;
        --emerald-700: #047857;
        --emerald-800: #065f46;
        --emerald-900: #064e3b;
        --white: #ffffff;
        --gray-50: #f8fafc;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --gray-400: #94a3b8;
        --gray-500: #64748b;
        --gray-600: #475569;
        --gray-700: #334155;
        --gray-800: #1e293b;
        --amber-400: #fbbf24;
        --amber-500: #f59e0b;
        --amber-600: #d97706;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Tajawal', sans-serif;
        background: var(--emerald-50);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        position: relative;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
      } /* دوائر خلفية زخرفية */
      body::before {
        content: '';
        position: fixed;
        top: -200px;
        left: -100px;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
        border-radius: 50%;
        z-index: 0;
        pointer-events: none;
      }
      body::after {
        content: '';
        position: fixed;
        bottom: -180px;
        right: -80px;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, transparent 70%);
        border-radius: 50%;
        z-index: 0;
        pointer-events: none;
      } /* 📦 البطاقة الرئيسية */
      .form-card {
        background: var(--white);
        width: 100%;
        max-width: 460px;
        padding: 36px 24px 28px;
        border-radius: 32px;
        box-shadow: 0 20px 60px rgba(6, 78, 59, 0.1), 0 4px 16px rgba(0, 0, 0, 0.04);
        border: 1px solid var(--gray-100);
        position: relative;
        z-index: 1;
        overflow: hidden;
      } /* خط علوي ملون */
      .form-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(90deg, #f59e0b, #fbbf24, #10b981, #059669);
      } /* ═══ الهيدر ═══ */
      .form-header {
        text-align: center;
        margin-bottom: 28px;
      }
      .header-icon {
        width: 72px;
        height: 72px;
        border-radius: 22px;
        background: linear-gradient(135deg, #fef3c7, #fde68a);
        margin: 0 auto 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        box-shadow: 0 8px 24px rgba(245, 158, 11, 0.18);
      }
      .form-header h2 {
        margin: 0;
        color: var(--gray-800);
        font-size: 26px;
        font-weight: 900;
        letter-spacing: -0.3px;
      }
      .form-header p {
        color: var(--gray-400);
        font-size: 14px;
        font-weight: 500;
        margin-top: 6px;
      } /* ═══ الحقول ═══ */
      .input-group {
        margin-bottom: 18px;
        position: relative;
      }
      .input-group label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        color: var(--gray-500);
        margin-bottom: 7px;
        letter-spacing: 0.2px;
      }
      .input-group input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1.5px solid var(--gray-200);
        box-sizing: border-box;
        font-size: 15px;
        font-family: 'Tajawal', sans-serif;
        color: var(--gray-800);
        transition: all 0.3s;
        background: var(--gray-50);
      }
      .input-group input:focus {
        outline: none;
        border-color: var(--emerald-400);
        background: var(--white);
        box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.1);
      }
      .input-group input::placeholder {
        color: var(--gray-400);
        font-size: 14px;
      } /* حقلين جنب بعض */
      .input-row {
        display: flex;
        gap: 12px;
      }
      .input-row .input-group {
        flex: 1;
      } /* ═══ زر الحفظ ═══ */
      .btn-save {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #059669, #047857);
        color: white;
        border: none;
        border-radius: 18px;
        font-size: 16px;
        font-weight: 800;
        font-family: 'Tajawal', sans-serif;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 8px 28px rgba(5, 150, 105, 0.3);
        margin-top: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        letter-spacing: -0.2px;
      }
      .btn-save:active {
        transform: scale(0.96);
        box-shadow: 0 4px 14px rgba(5, 150, 105, 0.25);
      } /* ═══ زر الرجوع ═══ */
      .back-link {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 18px;
        color: var(--gray-400);
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: color 0.2s;
      }
      .back-link:active {
        color: var(--emerald-600);
      } /* ═══ شارة اختيارية ═══ */
      .optional-badge {
        display: inline-block;
        background: var(--gray-100);
        color: var(--gray-400);
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 8px;
        margin-right: 6px;
        vertical-align: middle;
      } /* ═══ تجاوب ═══ */
      @media (max-width: 400px) {
        .form-card {
          padding: 28px 16px 22px;
          border-radius: 26px;
        }
        .form-header h2 {
          font-size: 22px;
        }
        .header-icon {
          width: 60px;
          height: 60px;
          font-size: 28px;
          border-radius: 18px;
        }
        .input-group input {
          padding: 12px 14px;
          font-size: 14px;
          border-radius: 14px;
        }
        .btn-save {
          padding: 14px;
          font-size: 15px;
          border-radius: 16px;
        }
        .input-row {
          gap: 8px;
        }
      }
    </style> </head> <body>
    <div class="form-card">
      <!-- ═══ الهيدر ═══ --> <div class="form-header">
        <div class="header-icon">💳</div> <h2>إضافة دين جديد</h2> <p>أدخل بيانات المريض والمبلغ المستحق</p>
      </div> <!-- ═══ الفورم ═══ --> <form method="POST">
        {% csrf_token %} <div class="input-row">
          <div class="input-group">
            <label>اللقب</label> <input type="text" name="last_name" placeholder="اللقب" required />
          </div> <div class="input-group">
            <label>الاسم</label> <input type="text" name="first_name" placeholder="الاسم" required />
          </div>
        </div> <div class="input-group">
          <label>نوع العلاج <span class="optional-badge">اختياري</span></label> <input type="text" name="treatment" placeholder="مثال: تنظيف، حشو، تقويم..." />
        </div> <div class="input-row">
          <div class="input-group">
            <label>المبلغ الإجمالي</label> <input type="number" name="total_amount" placeholder="0.00" required />
          </div> <div class="input-group">
            <label>المبلغ المدفوع</label> <input type="number" name="paid_amount" placeholder="0.00" />
          </div>
        </div> <button type="submit" class="btn-save">💾 حفظ البيانات</button>
      </form> <!-- ═══ الرجوع ═══ --> <a href="/debts/" class="back-link">← العودة إلى قائمة الديون</a>
    </div>
  </body>
</html>
