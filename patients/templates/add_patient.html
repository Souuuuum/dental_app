<!DOCTYPE html> <html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" /> <title>➕ إضافة مريض جديد | عيادة طب الأسنان</title> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" /> 
    <style>
         :root {
          --emerald-50: #ecfdf5;
          --emerald-100: #d1fae5;
          --emerald-200: #a7f3d0;
          --emerald-300: #6ee7b7;
          --emerald-400: #34d399;
          --emerald-500: #10b981;
          --emerald-600: #059669;
          --emerald-700: #047857;
          --emerald-800: #065f46;
          --emerald-900: #064e3b;
          --teal-400: #2dd4bf;
          --white: #ffffff;
          --gray-50: #f8fafc;
          --gray-100: #f1f5f9;
          --gray-200: #e2e8f0;
          --gray-300: #cbd5e1;
          --gray-400: #94a3b8;
          --gray-500: #64748b;
          --gray-600: #475569;
          --gray-700: #334155;
          --gray-800: #1e293b;
          --gray-900: #0f172a;
          --sky-400: #38bdf8;
        }
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        body {
          font-family: 'Tajawal', sans-serif;
          background: var(--emerald-50);
          min-height: 100vh;
          padding: 0;
          color: var(--gray-800);
          position: relative;
          overflow-x: hidden;
          -webkit-tap-highlight-color: transparent;
        } /* دوائر خلفية */
        body::before {
          content: '';
          position: fixed;
          top: -220px;
          left: -120px;
          width: 500px;
          height: 500px;
          background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
          border-radius: 50%;
          z-index: 0;
          pointer-events: none;
        }
        body::after {
          content: '';
          position: fixed;
          bottom: -200px;
          right: -100px;
          width: 450px;
          height: 450px;
          background: radial-gradient(circle, rgba(56, 189, 248, 0.07) 0%, transparent 70%);
          border-radius: 50%;
          z-index: 0;
          pointer-events: none;
        }
        .container {
          padding: 20px;
          max-width: 600px;
          margin: 0 auto;
          position: relative;
          z-index: 1;
        } /* ═══ زر الرجوع ═══ */
        .back {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          text-decoration: none;
          color: var(--gray-500);
          font-weight: 700;
          font-size: 14px;
          margin-bottom: 16px;
          padding: 10px 16px;
          background: var(--white);
          border-radius: 14px;
          border: 1px solid var(--gray-100);
          box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
          transition: all 0.2s;
        }
        .back:active {
          color: var(--emerald-600);
          background: var(--emerald-50);
          border-color: var(--emerald-200);
          transform: scale(0.96);
        } /* ═══ البطاقة ═══ */
        .card {
          background: var(--white);
          padding: 32px 22px 26px;
          border-radius: 32px;
          box-shadow: 0 20px 50px rgba(6, 78, 59, 0.08), 0 2px 10px rgba(0, 0, 0, 0.03);
          border: 1px solid var(--gray-100);
          position: relative;
          overflow: hidden;
        } /* خط علوي متدرج */
        .card::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 5px;
          background: linear-gradient(90deg, #10b981, #34d399, #2dd4bf, #38bdf8);
        } /* ═══ أيقونة الهيدر ═══ */
        .header-icon-wrap {
          width: 68px;
          height: 68px;
          border-radius: 20px;
          background: linear-gradient(135deg, #d1fae5, #a7f3d0);
          margin: 0 auto 14px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 34px;
          box-shadow: 0 8px 24px rgba(16, 185, 129, 0.15);
        }
        h2 {
          text-align: center;
          margin: 0 0 6px 0;
          font-size: 25px;
          font-weight: 900;
          color: var(--gray-800);
          letter-spacing: -0.3px;
        }
        .card-subtitle {
          text-align: center;
          font-size: 13px;
          font-weight: 500;
          color: var(--gray-400);
          margin-bottom: 24px;
        } /* ═══ الحقول ═══ */
        .form-row {
          display: flex;
          gap: 12px;
          margin-bottom: 16px;
        }
        .form-group {
          flex: 1;
        }
        .form-group label {
          display: block;
          font-size: 13px;
          font-weight: 700;
          color: var(--gray-500);
          margin-bottom: 6px;
          letter-spacing: 0.2px;
        }
        .form-group input {
          width: 100%;
          padding: 14px 15px;
          border-radius: 16px;
          border: 1.5px solid var(--gray-200);
          box-sizing: border-box;
          font-size: 15px;
          font-family: 'Tajawal', sans-serif;
          color: var(--gray-800);
          transition: all 0.3s;
          background: var(--gray-50);
        }
        .form-group input:focus {
          outline: none;
          border-color: var(--emerald-400);
          background: var(--white);
          box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.1);
        }
        .form-group input::placeholder {
          color: var(--gray-300);
        } /* ═══ العلاج السريع ═══ */
        .quick-treatments {
          background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
          padding: 16px 14px;
          border-radius: 18px;
          margin-bottom: 18px;
          border: 1.5px solid var(--emerald-100);
        }
        .quick-treatments .qt-header {
          display: flex;
          align-items: center;
          gap: 6px;
          margin-bottom: 12px;
        }
        .qt-dot {
          width: 8px;
          height: 8px;
          background: var(--emerald-400);
          border-radius: 50%;
          animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
          0%,
          100% {
            opacity: 1;
            transform: scale(1);
          }
          50% {
            opacity: 0.3;
            transform: scale(1.8);
          }
        }
        .quick-treatments .qt-label {
          font-size: 13px;
          font-weight: 700;
          color: var(--emerald-700);
        }
        .tags-container {
          display: ;
}
        .tags-container .tag-btn {
          background: var(--white);
          color: var(--emerald-700);
          border: 1.5px solid var(--emerald-200);
          font-family: 'Tajawal', sans-serif;
          font-size: 13px;
          font-weight: 700;
          padding: 9px 16px;
          border-radius: 14px;
          cursor: pointer;
          transition: all 0.25s;
          white-space: nowrap;
        }
        .tags-container .tag-btn:active {
          background: var(--emerald-600);
          color: white;
          border-color: var(--emerald-600);
          transform: scale(0.93);
          box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
        } /* ═══ حقل التاريخ ═══ */
        .form-group input[type='date'] {
          color: var(--gray-700);
          cursor: pointer;
        } /* ═══ زر الحفظ ═══ */
        .btn-submit {
          width: 100%;
          padding: 16px;
          border: none;
          border-radius: 18px;
          background: linear-gradient(135deg, #059669, #047857);
          color: white;
          font-size: 16px;
          font-weight: 800;
          font-family: 'Tajawal', sans-serif;
          cursor: pointer;
          box-shadow: 0 8px 28px rgba(5, 150, 105, 0.3);
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          margin-top: 6px;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          letter-spacing: -0.2px;
        }
        .btn-submit:active {
          transform: scale(0.96);
          box-shadow: 0 4px 14px rgba(5, 150, 105, 0.2);
        } /* ═══ تجاوب ═══ */
        @media (max-width: 420px) {
          .container {
            padding: 14px;
          }
          .card {
            padding: 24px 14px 20px;
            border-radius: 26px;
          }
          .form-row {
            gap: 8px;
          }
          .tags-container .tag-btn {
            font-size: 12px; 
            padding: 7px 12px;
            border-radius: 12px;}
          .form-group input {
            padding: 12px 13px;
            font-size: 14px;
            border-radius: 14px;
          }
        }
      </style>

</head> 
<body>
    <div class="container">
      <!-- ═══ رجوع ═══ --> <a class="back" href="/">← العودة للرئيسية</a> <!-- ═══ البطاقة ═══ --> <div class="card">
        <!-- هيدر -->
         <div class="header-icon-wrap">👤</div> 
        <h2>إضافة مريض جديد</h2> 
        <p class="card-subtitle">أدخل بيانات المريض والعلاج</p>
         <!-- فورم --> <form method="POST">
          {% csrf_token %} <!-- الاسم واللقب -->
           <div class="form-row">
            <div class="form-group">
              <label>👤 اللقب</label>
               <input type="text" name="last_name" placeholder="اللقب" required />
            </div> 
            <div class="form-group"> 
              <label>👤 الاسم</label> <input type="text" name="first_name" placeholder="الاسم" required />
            </div>
          </div> <!-- العلاج --> <div class="form-group" style="margin-bottom: 14px;">
            <label>💉 نوع العلاج</label> <input id="treatment" type="text" name="treatment" placeholder="مثال: حشو، تنظيف، تقويم..." required />
          </div> <!-- أزرار سريعة --> <div class="quick-treatments">
            <div class="qt-header">
              <span class="qt-dot"></span> <span class="qt-label">اختيار سريع</span>
            </div> <div class="tags-container">
              <button type="button" class="tag-btn" onclick="setTreatment('تنظيف')">🪥 تنظيف</button> <button type="button" class="tag-btn" onclick="setTreatment('حشو')">🦷 حشو</button>
               <button type="button" class="tag-btn" onclick="setTreatment('خلع')">🔧 خلع</button> 
               <button type="button" class="tag-btn" onclick="setTreatment('تقويم')">📐 تقويم</button>
                <button type="button" class="tag-btn" onclick="setTreatment('تبييض')">✨ تبييض</button>
                 <button type="button" class="tag-btn" onclick="setTreatment('معاينة')">🔍 معاينة</button>
                 <button type="button" class="tag-btn" onclick="setTreatment('تركيب طقم اسنان')">تركيب طقم اسنان</button>
                 <button type="button" class="tag-btn" onclick="setTreatment('اخد قياسات طقم الاسنان')">اخد قياسات طقم الاسنان</button>
                 <button type="button" class="tag-btn" onclick="setTreatment('لصق طقم الاسنان')">لصق طقم الاسنان</button>
                 
            </div>
          </div> <!-- موعد المراجعة -->
           <div class="form-group" style="margin-bottom: 10px;">
            <label>📅 موعد المراجعة</label> 
            <input type="date" name="next_appointment" value="{{ today }}" />
          </div> <!-- زر الحفظ -->
           <button type="submit" class="btn-submit">💾 حفظ الملف ومتابعة</button>
        </form>
      </div>
    </div> <script>
             function setTreatment(value) {
               const input = document.getElementById('treatment')
               input.value = value
               /* تأثير وميض أخضر */ input.style.transition = 'all 0.15s'
               input.style.borderColor = '#10B981'
               input.style.background = '#F0FDF4'
               input.style.boxShadow = '0 0 0 6px rgba(16,185,129,0.12)'
               setTimeout(() => {
                 input.style.borderColor = '#A7F3D0'
                 input.style.background = '#F8FAFC'
                 input.style.boxShadow = 'none'
               }, 600)
             }
           </script>
  </body>
</html>
