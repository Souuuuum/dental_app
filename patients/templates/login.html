<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>
   :root {
          --emerald-200: #a7f3d0;
          --emerald-500: #10b981;
          --emerald-800: #065f46;
          --white: #ffffff;
          --gray-50: #f8fafc;
          --gray-100: #f1f5f9;
          --gray-900: #0f172a;}
        * {
          
         
          box-sizing: border-box;
        }
body{
   
    font-family: 'Tajawal', sans-serif;
    background: var(--emerald-50);
    color: var(--gray-800);       
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background: var(--white);
    width:90%;
    
    padding: 32px 22px 26px;
    border-radius: 32px;
    box-shadow: 0 20px 50px rgba(6, 78, 59, 0.08), 0 2px 10px rgba(0, 0, 0, 0.03);
    border: 1px solid var(--gray-100);
    position: relative;
    overflow: hidden;
    max-width: 480px;
        
        
}
    .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(90deg, #10b981, #34d399, #2dd4bf, #38bdf8);
      }
      
    
h2{
    text-align: center;
    margin: 0 0 6px 0;
    font-size: 20px;
    font-weight: 900;
    color: var(--gray-800);
    letter-spacing: -0.3px;
}

input{
    width:100%;
    background: white;
    color: var(--emerald-800);
    padding: 12px 18px;
    border-radius: 16px;
    margin: 10px 0px 14px;
    font-size: 15px;
    display: flex;
    align-items: center;
    border: 1px solid var(--emerald-200);
    
}

button{
    width:100%;
    background: var(--emerald-500);
    color: white;
    padding: 12px 18px;
    border-radius: 16px;
    margin: 10px 0px 14px;
    font-size: 15px;
    display: flex;
    align-items: center;
    border: 1px solid var(--emerald-200);
    justify-content:center;
}

.error{
    color:red;
    text-align:center;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

    <h2>تسجيل الدخول لعيادة طب الأسنان
        
    </h2>
     
    <form method="POST">
        {% csrf_token %}
        <div >👤</div>
        <input type="text" name="username"placeholder="اسم المستخدم"required> 
            <div >🔒</div>
            <input type="password" name="password"placeholder="كلمة السر"required >
        <button type="submit">دخول</button>

    </form>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

</div>

</body>
</html>
