<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
    margin:0;
    font-family:system-ui;
    background:#f6f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    width:90%;
    max-width:350px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#4f46e5;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#4f46e5;
    color:white;
    font-size:16px;
    font-weight:bold;
}

.error{
    color:red;
    text-align:center;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

    <h2>تسجيل الدخول لعيادة طب الأسنان</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="اسم المستخدم"
               required>

        <input type="password"
               name="password"
               placeholder="كلمة السر"
               required>

        <button type="submit">
            دخول
        </button>

    </form>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

</div>

</body>
</html>
